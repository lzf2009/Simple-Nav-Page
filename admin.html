<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>导航编辑器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;
  --bg2:rgba(18,24,36,0.82);
  --bg3:rgba(28,36,54,0.75);
  --glass:rgba(255,255,255,0.06);
  --glass-hover:rgba(255,255,255,0.10);
  --border:rgba(255,255,255,0.10);
  --border2:rgba(255,255,255,0.18);
  --text:#f0f2ff;--text2:#a8b4d8;--text3:#5a6a9a;
  --accent:#3ecf8e;--accent2:#5de8a8;
  --accent-blue:#5b8ef5;
  --green:#3ecf8e;--red:#f05f7a;--orange:#f5a623;
  --radius:14px;--radius-sm:8px;--radius-xs:6px;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  font-size:14px;
  background:linear-gradient(135deg,#0d1117 0%,#111827 50%,#0d1a2e 100%);
  min-height:100vh;
}
html,body{height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{
  display:flex;align-items:center;gap:12px;
  padding:0 20px;height:54px;
  background:rgba(13,17,23,0.75);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,0.3);
}
#topbar h1{font-size:15px;font-weight:700;letter-spacing:0.02em;
  background:linear-gradient(90deg,var(--accent),var(--accent-blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#body{display:flex;flex:1;overflow:hidden}
#sidebar{
  width:200px;flex-shrink:0;
  background:rgba(13,17,23,0.65);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
#main{flex:1;overflow-y:scroll;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom, 0px))}
#main::-webkit-scrollbar{width:5px}
#main::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .18s}
.btn-primary{background:linear-gradient(135deg,var(--accent),#29b87a);color:#0a1f14;font-weight:600;box-shadow:0 2px 12px rgba(62,207,142,0.3);}
.btn-primary:hover{background:linear-gradient(135deg,var(--accent2),var(--accent));box-shadow:0 4px 18px rgba(62,207,142,0.45);transform:translateY(-1px)}
.btn-ghost{background:var(--glass);color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--glass-hover);color:var(--text);border-color:var(--border2)}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--border)}.btn-danger:hover{background:rgba(240,95,122,.12);border-color:rgba(240,95,122,.4)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:active:not(:disabled){transform:scale(.97)}
input[type=text],input[type=url],input[type=password],input[type=search]{
  width:100%;padding:7px 10px;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  border-radius:var(--radius-xs);color:var(--text);font-size:13px;outline:none;
  transition:border-color .15s,background .15s;
}
input:focus{border-color:var(--accent);background:rgba(62,207,142,0.06)}
#login-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 20px}
.login-card{
  background:rgba(18,26,42,0.85);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border2);border-radius:18px;
  padding:36px;width:100%;max-width:440px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.04);
}
.login-card h2{font-size:20px;font-weight:700;letter-spacing:0.01em;
  background:linear-gradient(90deg,var(--accent),var(--accent-blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:6px;
}
.login-card p{color:var(--text2);font-size:13px;margin-bottom:24px;line-height:1.7}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;letter-spacing:0.02em}
.tip{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5}
.tip a{color:var(--accent);text-decoration:none;opacity:.85}.tip a:hover{opacity:1}
.sidebar-header{padding:14px 14px 8px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;}
.sec-item{display:flex;align-items:center;gap:7px;padding:7px 12px;cursor:pointer;border-radius:10px;margin:1px 6px;border:1px solid transparent;transition:all .15s;}
.sec-item:hover{background:var(--glass);border-color:var(--border)}
.sec-item.active{background:rgba(62,207,142,0.12);border-color:rgba(62,207,142,0.3);}
.sec-item .sec-name{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-item.active .sec-name{color:var(--accent);font-weight:600}
.sec-item .sec-count{font-size:10px;color:var(--text3);background:rgba(255,255,255,0.08);padding:1px 7px;border-radius:20px;flex-shrink:0;}
.sec-item.active .sec-count{background:rgba(62,207,142,0.2);color:var(--accent)}
.sec-item .lock-badge{font-size:11px;opacity:.7;flex-shrink:0}
.drag-handle{color:var(--text3);font-size:12px;cursor:grab;flex-shrink:0;user-select:none;opacity:.5}
.drag-handle:active{cursor:grabbing}
.sidebar-footer{padding:12px 10px;border-top:1px solid var(--border);margin-top:auto}
.sec-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sec-header .cnt{font-size:12px;color:var(--text3);background:rgba(255,255,255,0.06);padding:2px 10px;border-radius:20px}
.sec-header-actions{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.links-table{width:100%;border-collapse:collapse;min-width:820px}
.links-table th{padding:8px 8px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);white-space:nowrap;}
.links-table td{padding:5px 5px;vertical-align:middle;border-bottom:1px solid rgba(255,255,255,0.05)}
.links-table tr:last-child td{border-bottom:none}
.links-table tr:hover td{background:rgba(255,255,255,.025)}
.links-table input{padding:5px 7px;font-size:12px}
.icon-cell{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);overflow:hidden;cursor:pointer;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;margin:0 auto;position:relative;transition:all .15s;flex-shrink:0;}
.icon-cell:hover{border-color:var(--accent);box-shadow:0 0 0 2px rgba(62,207,142,0.2)}
.icon-cell img{width:100%;height:100%;object-fit:contain}
.icon-cell .badge-auto{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;background:var(--bg);border-radius:50%;border:1px solid var(--border);font-size:7px;display:flex;align-items:center;justify-content:center;line-height:1}
.icon-cell .badge-custom{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;background:var(--accent);border-radius:50%;border:1px solid var(--bg)}
.ipanel{position:fixed;z-index:1000;background:rgba(15,20,35,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,0.7);width:380px;overflow-x:hidden;overflow-y:hidden;}
.ipanel-tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2)}
.ipanel-tab{flex:1;padding:9px 0;text-align:center;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s}
.ipanel-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.ipanel-tab:hover:not(.active){color:var(--text2)}
.ipanel-body{padding:12px}
.auto-preview{display:flex;flex-direction:column;align-items:center;gap:10px;padding:8px 0}
.auto-preview .big-icon{width:56px;height:56px;border-radius:12px;border:1px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;overflow:hidden}
.auto-preview .big-icon img{width:100%;height:100%;object-fit:contain}
.auto-preview p{font-size:12px;color:var(--text2);text-align:center;line-height:1.5}
.auto-preview .domain{font-size:11px;color:var(--text3)}
.upload-mini{border:2px dashed var(--border2);border-radius:var(--radius-sm);padding:20px 16px;text-align:center;cursor:pointer;transition:all .15s}
.upload-mini:hover,.upload-mini.drag{border-color:var(--accent);background:rgba(62,207,142,.05)}
.upload-mini p{color:var(--text2);font-size:12px;margin-top:6px}
.upload-mini small{color:var(--text3);font-size:11px}
.icon-search-wrap{position:relative;margin-bottom:10px}
.icon-search-wrap input{padding-left:28px;font-size:12px}
.icon-search-wrap::before{content:'🔍';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none}
.icon-grid-scroll{max-height:280px;overflow-y:auto;overflow-x:hidden}
.icon-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%}
.icon-opt{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border-radius:8px;cursor:pointer;border:1.5px solid transparent;transition:all .12s}
.icon-opt:hover{background:var(--glass);border-color:var(--border)}
.icon-opt.sel{border-color:var(--accent);background:rgba(62,207,142,.1)}
.icon-opt img{width:36px;height:36px;object-fit:contain;border-radius:4px}
.icon-opt span{font-size:11px;color:var(--text3);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.ipanel-footer{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:rgba(0,0,0,0.15)}
#icons-panel{display:none}
.icons-mgr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:12px;margin-top:16px}
.icons-mgr-grid .empty{grid-column:1/-1;writing-mode:horizontal-tb}
.icon-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 8px;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius-sm);position:relative;transition:all .15s;}
.icon-card:hover{background:var(--glass-hover);border-color:var(--border2)}
.icon-card img{width:38px;height:38px;object-fit:contain;border-radius:6px}
.icon-card .iname{font-size:10px;color:var(--text2);word-break:break-all;text-align:center;line-height:1.3}
.icon-card .del-icon{position:absolute;top:4px;right:4px;width:18px;height:18px;background:var(--red);border-radius:50%;border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.icon-card:hover .del-icon{opacity:1}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:28px 20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--glass);}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(62,207,142,.05)}
.upload-zone p{color:var(--text2);font-size:13px;margin-top:8px}
.upload-zone small{color:var(--text3);font-size:11px}
#toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;z-index:9999;display:none;backdrop-filter:blur(10px)}
.toast-ok{background:rgba(62,207,142,0.15);color:var(--green);border:1px solid rgba(62,207,142,.35)}
.toast-err{background:rgba(240,95,122,0.15);color:var(--red);border:1px solid rgba(240,95,122,.35)}
.progress{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-blue));transition:width .3s}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:13px}
.drag-row-over{outline:2px solid var(--accent);outline-offset:-1px;border-radius:4px}
.sec-drag-over{background:rgba(62,207,142,.08)!important;border-color:rgba(62,207,142,.3)!important}
.pwd-wrap{position:relative}
.pwd-wrap input{padding-right:36px}
.eye-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;display:flex;align-items:center;font-size:15px;line-height:1}
.eye-btn:hover{color:var(--text2)}
.sec-title-input{max-width:220px;font-size:16px;font-weight:700;background:transparent;border:1px solid transparent;padding:4px 10px;border-radius:var(--radius-sm);color:var(--text);letter-spacing:0.01em;}
.sec-title-input:focus{border-color:var(--accent);background:rgba(62,207,142,0.06);outline:none}
@media (max-width:768px){
  #topbar{padding:0 12px;gap:8px}
  #topbar h1{font-size:13px}
  #repo-label{display:none}
  .pc-label{display:none}
  .topbar-right{gap:5px}
  .topbar-right .btn-ghost:not(#mob-menu-btn):not([onclick*="showPanel"]){display:none}
  #save-btn{padding:4px 8px;font-size:11px}
  #mob-menu-btn{display:flex!important}
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:500;width:220px;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 30px rgba(0,0,0,.6);}
  #sidebar.mob-open{transform:translateX(0)}
  #mob-overlay{display:none;position:fixed;inset:0;z-index:499;background:rgba(0,0,0,.5)}
  #mob-overlay.show{display:block}
  #main{padding:12px;padding-bottom:calc(60px + env(safe-area-inset-bottom, 0px))}
  .sec-header{gap:6px}
  .sec-header-actions{width:100%;justify-content:flex-end}
  .protect-toggle{font-size:11px;padding:3px 9px}
  .links-table{min-width:640px}
  .login-card{padding:24px 18px}
  .ipanel{width:calc(100vw - 24px)!important;left:12px!important;right:12px!important}
  #toast{bottom:16px;right:12px;left:12px;text-align:center}
  .btn{min-height:36px}
  input[type=text],input[type=url],input[type=password],input[type=search]{min-height:40px;font-size:14px}
}
#mob-menu-btn{display:none}
</style>
</head>
<body>
<div id="app">

<div id="login-panel">
  <div class="login-card">
    <h2>🧭 导航编辑器</h2>
    <div id="login-full">
      <p>首次登录需输入 Token 和短密码，之后只需短密码解锁。</p>
      <div class="field">
        <label>GitHub Token</label>
        <div class="pwd-wrap"><input type="password" id="inp-token" placeholder="ghp_xxxxxxxxxxxxxx"/><button type="button" class="eye-btn" onclick="togglePwd('inp-token',this)" tabindex="-1">👁</button></div>
        <div class="tip">需要 Contents <strong>Read and write</strong> 权限。<a href="https://github.com/settings/personal-access-tokens/new" target="_blank">Fine-grained token →</a></div>
      </div>
      <div class="field">
        <label>短密码（用于加密保存 Token）</label>
        <div class="pwd-wrap"><input type="password" id="inp-pin" placeholder="自定义短密码，记住它" autocomplete="new-password"/><button type="button" class="eye-btn" onclick="togglePwd('inp-pin',this)" tabindex="-1">👁</button></div>
        <div class="tip">短密码只存在你脑子里，不会被上传或存储，忘记后需重新输入 Token。</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
        <button class="btn btn-primary" onclick="doLogin()">连接并保存</button>
        <span id="login-st" style="font-size:12px;color:var(--text3)"></span>
      </div>
    </div>
    <div id="login-unlock" style="display:none">
      <p>检测到已保存的加密 Token，输入短密码解锁。</p>
      <div class="field">
        <label>短密码</label>
        <div class="pwd-wrap"><input type="password" id="inp-pin2" placeholder="输入短密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doUnlock()"/><button type="button" class="eye-btn" onclick="togglePwd('inp-pin2',this)" tabindex="-1">👁</button></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
        <button class="btn btn-primary" onclick="doUnlock()">解锁</button>
        <button class="btn btn-ghost" onclick="showFullLogin()">重新输入 Token</button>
        <span id="unlock-st" style="font-size:12px;color:var(--text3)"></span>
      </div>
    </div>
  </div>
</div>

<div id="editor-ui" style="display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden">
  <div id="topbar">
    <button id="mob-menu-btn" class="btn btn-ghost btn-sm" onclick="toggleMobSidebar()" style="padding:4px 8px;font-size:16px">☰</button>
    <span>🧭</span>
    <h1>导航编辑器</h1>
    <span id="repo-label" style="font-size:12px;color:var(--text3)"></span>
    <div class="topbar-right">
      <span id="dirty-st" style="font-size:12px"></span>
      <button class="btn btn-ghost btn-sm" onclick="showPanel('icons')" title="图标管理">🖼 <span class="pc-label">图标管理</span></button>
      <button class="btn btn-ghost btn-sm" onclick="showPanel('links')" title="链接编辑">🔗 <span class="pc-label">链接编辑</span></button>
      <button class="btn btn-primary btn-sm" id="save-btn" onclick="saveAll()">💾 保存到 GitHub</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">退出</button><button class="btn btn-danger btn-sm" onclick="doClearLogout()" title="退出并清除本地存储">🗑 清除</button>
    </div>
  </div>
  <div id="mob-overlay" onclick="closeMobSidebar()"></div>
  <div id="body">
    <div id="sidebar">
      <div class="sidebar-header">分类</div>
      <div id="sec-list"></div>
      <div class="sidebar-footer">
        <div style="display:flex;flex-direction:column;gap:6px">
          <button class="btn btn-ghost" style="width:100%;justify-content:center;font-size:12px" onclick="addSection()">＋ 新建分类</button>
        </div>
      </div>
    </div>
    <div id="main">
      <div id="links-panel">
        <div id="links-content"><div class="empty"><span class="spinner"></span>正在加载…</div></div>
      </div>
      <div id="icons-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
          <div>
            <h2 style="font-size:16px;font-weight:700">图标管理</h2>
            <p style="font-size:12px;color:var(--text3);margin-top:3px">存储在仓库 <code style="background:var(--glass);padding:1px 6px;border-radius:4px">icons/logos/</code> 目录</p>
          </div>
          <button class="btn btn-primary btn-sm" onclick="document.getElementById('icon-file-input').click()">＋ 上传图标</button>
          <input id="icon-file-input" type="file" accept="image/*,.svg,.ico" multiple style="display:none" onchange="uploadIconFiles(Array.from(event.target.files));event.target.value=''">
        </div>
        <div class="upload-zone" id="drop-zone"
          onclick="document.getElementById('icon-file-input').click()"
          ondragover="event.preventDefault();this.classList.add('drag')"
          ondragleave="this.classList.remove('drag')"
          ondrop="handleIconDrop(event)">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p>点击或拖拽上传图标</p>
          <small>PNG · SVG · ICO · JPG · WebP</small>
        </div>
        <div id="upload-prog" style="display:none;margin-top:10px">
          <div style="font-size:12px;color:var(--text2)" id="prog-txt"></div>
          <div class="progress"><div class="progress-bar" id="prog-bar" style="width:0"></div></div>
        </div>
        <div class="icons-mgr-grid" id="icons-grid"><div class="empty"><span class="spinner"></span>加载中…</div></div>
      </div>
    </div>
  </div>
</div>

<div id="ipanel" class="ipanel" style="display:none">
  <div class="ipanel-tabs">
    <div class="ipanel-tab active" onclick="switchITab('auto')">🌐 自动获取</div>

<script>
const ICONS_DIR = 'icons/logos';
const ICONS_PREFIX = 'icons/logos/';
const _basePath = location.pathname.replace(/\/admin(\.html.*)?$/, '');

let TOKEN='',REPO='',BRANCH='main';
let linksData=[],iconsData=[],linksSha='';
let currentSec=0,isDirty=false;
let dragRowSrc=null,dragSecSrc=null;

let pickerTarget=null;
let pickerTab='auto';
let pickerPendingIcon='';

let _faviconProvider = 'duckduckgo';
let _faviconProxy    = '';

const DEFAULT_ICON = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjIiPjxjaXJjbGUgY3g9IjEyIiBjeT0iMTIiIHI9IjEwIi8+PHBhdGggZD0iTTIgMTJoMjAiLz48cGF0aCBkPSJNMTIgMmExNS4zIDE1LjMgMCAwIDEgNCAxMCAxNS4zIDE1LjMgMCAwIDEtNCAxMCAxNS4zIDE1LjMgMCAwIDEtNC0xMCAxNS4zIDE1LjMgMCAwIDEgNC0xMHoiLz48L3N2Zz4=';

function _withProxy(url) {
  if (!_faviconProxy) return url;
  return _faviconProxy + '/' + url.replace(/^https?:\/\//, '');
}
function buildFaviconUrl(domain) {
  if (!domain) return DEFAULT_ICON;
  if (_faviconProvider === 'google')
    return _withProxy(`https://www.google.com/s2/favicons?sz=64&domain=${domain}`);
  return _withProxy(`https://icons.duckduckgo.com/ip3/${domain}.ico`);
}

(async function syncFaviconConfig() {
  try {
    const candidates = ['./main.js', '../main.js'];
    for (const path of candidates) {
      try {
        const res = await fetch(path);
        if (!res.ok) continue;
        const text = await res.text();
        const providerMatch = text.match(/FAVICON_PROVIDER\s*=\s*['"](\w+)['"]/);
        const proxyMatch    = text.match(/(?:^|\n)const PROXY\s*=\s*['"]([^'"]*)['"]/m);
        if (providerMatch) _faviconProvider = providerMatch[1];
        if (proxyMatch)    _faviconProxy    = proxyMatch[1];
        break;
      } catch {}
    }
  } catch {}
})();

const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
function getDomain(url){try{return new URL(url).hostname;}catch{return '';}}

let toastTimer;
function toast(msg,type='ok',dur=2800){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast-'+type;el.style.display='block';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.style.display='none',dur);
}
function setDirty(v=true){
  isDirty=v;
  const el=document.getElementById('dirty-st');
  el.textContent=v?'● 未保存':'';el.style.color=v?'var(--orange)':'';
}

const HARDCODED_REPO   = 'lzf2009/Simple-Nav-Page';
const HARDCODED_BRANCH = 'main';

function detectRepo(){
  if(HARDCODED_REPO) return{repo:HARDCODED_REPO,branch:HARDCODED_BRANCH};
  const host=location.hostname;
  const path=location.pathname;
  const ghMatch=host.match(/^([^.]+)\.github\.io$/);
  if(ghMatch){
    const owner=ghMatch[1];
    const repoSegment=path.split('/').filter(Boolean)[0]||'';
    if(repoSegment) return{repo:`${owner}/${repoSegment}`,branch:'main'};
  }
  return{repo:sessionStorage.getItem('nr')||'',branch:sessionStorage.getItem('nb')||'main'};
}

async function deriveKey(pin){
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pin),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt:new TextEncoder().encode('nav-editor-salt'),iterations:100000,hash:'SHA-256'},
    base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']
  );
}
async function encryptToken(pin,token){
  const key=await deriveKey(pin);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const enc=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(token));
  const buf=new Uint8Array(12+enc.byteLength);buf.set(iv);buf.set(new Uint8Array(enc),12);
  return btoa(String.fromCharCode(...buf));
}
async function decryptToken(pin,data){
  const buf=Uint8Array.from(atob(data),c=>c.charCodeAt(0));
  const iv=buf.slice(0,12),ct=buf.slice(12);
  const key=await deriveKey(pin);
  const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return new TextDecoder().decode(dec);
}

function hasStoredToken(){return!!localStorage.getItem('enc_token');}

function loadSaved(){
  if(hasStoredToken()){
    document.getElementById('login-full').style.display='none';
    document.getElementById('login-unlock').style.display='block';
    setTimeout(()=>document.getElementById('inp-pin2')?.focus(),100);
  }
}

function showFullLogin(){
  document.getElementById('login-full').style.display='block';
  document.getElementById('login-unlock').style.display='none';
  document.getElementById('login-st').textContent='';
}

async function doUnlock(){
  const pin=document.getElementById('inp-pin2').value;
  if(!pin){toast('请输入短密码','err');return;}
  const st=document.getElementById('unlock-st');st.textContent='解锁中…';
  try{
    const enc=localStorage.getItem('enc_token');
    TOKEN=await decryptToken(pin,enc);
    const{repo,branch}=detectRepo();
    REPO=repo;BRANCH=branch;
    if(!REPO){st.textContent='❌ 无法识别仓库';return;}
    await gh(`git/ref/heads/${BRANCH}`);
    sessionStorage.setItem('nt',TOKEN);
    document.getElementById('login-panel').style.display='none';
    const eu=document.getElementById('editor-ui');eu.style.display='flex';eu.style.flex='1';eu.style.minHeight='0';eu.style.overflow='hidden';
    document.getElementById('repo-label').textContent=REPO+' @ '+BRANCH;
    await loadIcons();
    await loadLinks();
  }catch(e){
    st.textContent='❌ '+(e.message.includes('operation-specific')||e.message.includes('decrypt')?'短密码错误':''+e.message);
  }
}

async function gh(path,opts={}){
  const res=await fetch(`https://api.github.com/repos/${REPO}/${path}`,{
    ...opts,
    headers:{'Authorization':'Bearer '+TOKEN,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28',...(opts.headers||{})}
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||'HTTP '+res.status);}
  return res.status===204?null:res.json();
}
async function getFile(fp){
  const d=await gh(`contents/${fp}?ref=${BRANCH}`);
  return{content:decodeURIComponent(escape(atob(d.content.replace(/\s/g,'')))),sha:d.sha};
}
async function putFile(fp,content,sha,msg){
  const b64=btoa(unescape(encodeURIComponent(content)));
  return gh(`contents/${fp}`,{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:msg,content:b64,...(sha?{sha}:{}),branch:BRANCH})});
}
async function putBinary(fp,bytes,sha,msg){
  let s='';bytes.forEach(b=>s+=String.fromCharCode(b));
  return gh(`contents/${fp}`,{method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:msg,content:btoa(s),...(sha?{sha}:{}),branch:BRANCH})});
}
async function delFile(fp,sha,msg){
  return gh(`contents/${fp}`,{method:'DELETE',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:msg,sha,branch:BRANCH})});
}

async function doLogin(){
  TOKEN=document.getElementById('inp-token').value.trim();
  const pin=document.getElementById('inp-pin').value;
  if(!TOKEN){toast('请输入 GitHub Token','err');return;}
  if(!pin){toast('请设置短密码','err');return;}
  const{repo,branch}=detectRepo();
  REPO=repo;BRANCH=branch;
  if(!REPO){toast('无法自动识别仓库','err');return;}
  const st=document.getElementById('login-st');st.textContent='连接中…';
  try{
    await gh(`git/ref/heads/${BRANCH}`);
    const enc=await encryptToken(pin,TOKEN);
    localStorage.setItem('enc_token',enc);
    sessionStorage.setItem('nt',TOKEN);
    document.getElementById('login-panel').style.display='none';
    const eu=document.getElementById('editor-ui');eu.style.display='flex';eu.style.flex='1';eu.style.minHeight='0';eu.style.overflow='hidden';
    document.getElementById('repo-label').textContent=REPO+' @ '+BRANCH;
    await loadIcons();
    await loadLinks();
  }catch(e){st.textContent='❌ '+e.message;}
}
function doLogout(){sessionStorage.clear();location.reload();}
function doClearLogout(){
  if(!confirm('确定清除本地保存的加密 Token 吗？下次需重新输入。'))return;
  localStorage.removeItem('enc_token');sessionStorage.clear();location.reload();
}

async function loadLinks(){
  try{
    const{content,sha}=await getFile('links.json');
    linksSha=sha;
    const raw=JSON.parse(content);
    linksData=raw.map(sec=>({
      ...sec,_id:uid(),
      items:(sec.items||[]).map(it=>({...it,_id:uid()}))
    }));
    renderSidebar();renderSection(currentSec);
  }catch(e){toast('加载 links.json 失败：'+e.message,'err',6000);}
}

// ── FIX 4: 加 _nc 参数防止 GitHub API 返回缓存的旧文件列表 ──
async function loadIcons(){
  try{
    const files=await gh(`contents/${ICONS_DIR}?ref=${BRANCH}&_nc=${Date.now()}`).catch(()=>[]);
    iconsData=Array.isArray(files)
      ?files.filter(f=>/\.(png|jpg|jpeg|svg|ico|webp|gif)$/i.test(f.name))
             .map(f=>({name:f.name,sha:f.sha,url:f.download_url}))
      :[];
  }catch{iconsData=[];}
  renderIconsGrid();
}

function showPanel(p){
  document.getElementById('links-panel').style.display=p==='links'?'block':'none';
  document.getElementById('icons-panel').style.display=p==='icons'?'block':'none';
  document.getElementById('sidebar').style.display=p==='links'?'flex':'none';
  if(p==='icons')renderIconsGrid();
}

function renderSidebar(){
  document.getElementById('sec-list').innerHTML=linksData.map((sec,si)=>`
    <div class="sec-item ${si===currentSec?'active':''}" draggable="true"
      onclick="selectSection(${si})"
      ondragstart="dragSecSrc=${si};event.dataTransfer.effectAllowed='move';this.style.opacity='.4'"
      ondragover="event.preventDefault();this.classList.add('sec-drag-over')"
      ondragleave="this.classList.remove('sec-drag-over')"
      ondrop="dropSec(event,${si})"
      ondragend="this.style.opacity=''">
      <span class="drag-handle">⠿</span>
      <span class="sec-name">${esc(sec.section)}</span>
      <span class="sec-count">${sec.items.length}</span>
    </div>`).join('');
}
function selectSection(si){currentSec=si;renderSidebar();renderSection(si);showPanel('links');if(window.innerWidth<=768)closeMobSidebar();}
function dropSec(e,ti){
  e.preventDefault();
  document.querySelectorAll('.sec-item').forEach(el=>el.classList.remove('sec-drag-over'));
  if(dragSecSrc===null||dragSecSrc===ti)return;
  const[m]=linksData.splice(dragSecSrc,1);linksData.splice(ti,0,m);
  currentSec=ti;dragSecSrc=null;setDirty();renderSidebar();renderSection(currentSec);
}

function renderSection(si){
  const panel=document.getElementById('links-content');
  if(!linksData.length){panel.innerHTML='<div class="empty">还没有分类，点击左侧添加</div>';return;}
  const sec=linksData[si];
  if(!sec){panel.innerHTML='';return;}
  panel.innerHTML=`
    <div class="sec-header">
      <input class="sec-title-input" type="text" value="${esc(sec.section)}"
        onfocus="this.style.borderColor='var(--accent)'"
        onblur="this.style.borderColor='transparent'"
        onchange="linksData[${si}].section=this.value;setDirty();renderSidebar()">
      <span class="cnt">${sec.items.length} 条</span>
      <div class="sec-header-actions">
        <button class="btn btn-ghost btn-sm" onclick="addItem(${si})">＋ 添加</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSection(${si})">删除分类</button>
      </div>
    </div>
    <div style="overflow-x:auto">
    <table class="links-table">
      <thead><tr>
        <th style="width:18px"></th>
        <th style="width:44px;text-align:center">图标</th>
        <th style="min-width:110px">名称</th>
        <th style="min-width:180px">URL（外网）</th>
        <th style="min-width:120px">简介</th>
        <th style="min-width:120px">搜索词</th>
        <th style="min-width:150px">内网地址</th>
        <th style="width:44px"></th>
      </tr></thead>
      <tbody id="tbody-${si}">
        ${sec.items.map((it,ii)=>rowHtml(si,ii,it)).join('')}
      </tbody>
    </table></div>`;
}

// ── FIX 3: 自定义图标 src 加 sha 后缀破缓存 ──
function iconCellHtml(si,ii,it){
  const domain=getDomain(it.url);
  if(it.icon){
    const name=it.icon.replace(/^.*\/([^/]+)$/,'$1');
    const found=iconsData.find(i=>i.name===name);
    const _ts=found?found.sha.slice(-6):Date.now();
    const src=SITE_ICON_BASE+name+'?t='+_ts;
    const fallback=found?found.url:'';
    return `<div class="icon-cell" onclick="openIPPanel(${si},${ii},this)" title="自定义：${esc(name)}">
      <img src="${src}" alt="" onerror="this.src='${fallback}'">
      <div class="badge-custom" title="自定义"></div>
    </div>`;
  } else {
    const favUrl=domain?buildFaviconUrl(domain):'';
    return `<div class="icon-cell" onclick="openIPPanel(${si},${ii},this)" title="自动抓取：${domain||'无URL'}">
      ${favUrl?`<img src="${favUrl}" alt="" onerror="this.src=''">`:'<span style="font-size:16px">🌐</span>'}
      <div class="badge-auto" title="自动">⚡</div>
    </div>`;
  }
}

function rowHtml(si,ii,it){
  return`<tr draggable="true"
    ondragstart="dragRowSrc={si:${si},ii:${ii}};event.dataTransfer.effectAllowed='move';this.style.opacity='.4'"
    ondragover="event.preventDefault();document.querySelectorAll('.drag-row-over').forEach(x=>x.classList.remove('drag-row-over'));this.classList.add('drag-row-over')"
    ondragleave="this.classList.remove('drag-row-over')"
    ondrop="dropRow(event,${si},${ii})"
    ondragend="this.style.opacity='';document.querySelectorAll('.drag-row-over').forEach(x=>x.classList.remove('drag-row-over'))">
    <td><span class="drag-handle">⠿</span></td>
    <td style="text-align:center">${iconCellHtml(si,ii,it)}</td>
    <td><input type="text" value="${esc(it.title)}" placeholder="名称" onchange="upd(${si},${ii},'title',this.value)"></td>
    <td><input type="url" value="${esc(it.url)}" placeholder="https://" onchange="updUrl(${si},${ii},this.value)"></td>
    <td><input type="text" value="${esc(it.desc||'')}" placeholder="简介" onchange="upd(${si},${ii},'desc',this.value)"></td>
    <td><input type="text" value="${esc(it['data-desc']||'')}" placeholder="关键词（逗号分隔）" onchange="upd(${si},${ii},'data-desc',this.value)"></td>
    <td><input type="url" value="${esc(it.intranet||'')}" placeholder="http://192.168.x.x" onchange="upd(${si},${ii},'intranet',this.value)"></td>
    <td><button class="btn btn-danger btn-sm" onclick="deleteItem(${si},${ii})">✕</button></td>
  </tr>`;
}

function upd(si,ii,k,v){linksData[si].items[ii][k]=v;setDirty();}
function updUrl(si,ii,v){
  linksData[si].items[ii].url=v;setDirty();
  if(!linksData[si].items[ii].icon){
    const cells=document.querySelectorAll(`#tbody-${si} tr:nth-child(${ii+1}) .icon-cell`);
    cells.forEach(cell=>{
      const domain=getDomain(v);
      const img=cell.querySelector('img');
      if(img&&domain) img.src=buildFaviconUrl(domain);
    });
  }
}

function addItem(si){
  linksData[si].items.push({_id:uid(),title:'',url:'',desc:'','data-desc':'',icon:'',intranet:''});
  setDirty();renderSection(si);renderSidebar();
  setTimeout(()=>{const rows=document.querySelectorAll(`#tbody-${si} tr`);rows[rows.length-1]?.querySelector('input')?.focus();},50);
}
function deleteItem(si,ii){if(!confirm('确定删除「'+linksData[si].items[ii].title+'」？'))return;linksData[si].items.splice(ii,1);setDirty();renderSection(si);renderSidebar();}

function addSection(){
  linksData.push({_id:uid(),section:'新分类',items:[]});
  currentSec=linksData.length-1;setDirty();renderSidebar();renderSection(currentSec);showPanel('links');
}
function deleteSection(si){
  if(!confirm(`确定删除「${linksData[si].section}」？`))return;
  linksData.splice(si,1);currentSec=Math.max(0,si-1);setDirty();renderSidebar();renderSection(currentSec);
}
function dropRow(e,si,ti){
  e.preventDefault();
  if(!dragRowSrc||dragRowSrc.si!==si||dragRowSrc.ii===ti)return;
  const items=linksData[si].items;
  const[m]=items.splice(dragRowSrc.ii,1);
  items.splice(dragRowSrc.ii<ti?ti-1:ti,0,m);
  dragRowSrc=null;setDirty();renderSection(si);
}

function openIPPanel(si,ii,cellEl){
  pickerTarget={si,ii};
  pickerPendingIcon=linksData[si].items[ii].icon||'';
  const panel=document.getElementById('ipanel');
  panel.style.visibility='hidden';
  panel.style.display='block';
  document.getElementById('ipanel-backdrop').style.display='block';
  switchITab(pickerPendingIcon?'pick':'auto');
  requestAnimationFrame(()=>{
    const rect=cellEl.getBoundingClientRect();
    const pw=panel.offsetWidth||300;
    const ph=panel.offsetHeight||260;
    const vw=window.innerWidth;
    const vh=window.innerHeight;
    const GAP=8;
    let top=rect.bottom+GAP;
    if(top+ph>vh-GAP) top=Math.max(GAP, rect.top-ph-GAP);
    let left=rect.left;
    if(left+pw>vw-GAP) left=vw-pw-GAP;
    if(left<GAP) left=GAP;
    panel.style.position='fixed';
    panel.style.top=top+'px';
    panel.style.left=left+'px';
    panel.style.visibility='visible';
  });
}
function closeIPPanel(){
  document.getElementById('ipanel').style.display='none';
  document.getElementById('ipanel-backdrop').style.display='none';
  pickerTarget=null;
}
function switchITab(tab){
  pickerTab=tab;
  document.querySelectorAll('.ipanel-tab').forEach((el,i)=>{
    el.classList.toggle('active',['auto','upload','pick'][i]===tab);
  });
  renderITabBody();
}
function renderITabBody(){
  const body=document.getElementById('ipanel-body');
  const{si,ii}=pickerTarget||{si:0,ii:0};
  const item=linksData[si]?.items[ii]||{};
  const domain=getDomain(item.url||'');

  if(pickerTab==='auto'){
    const favUrl=domain?buildFaviconUrl(domain):'';
    const isAuto=!item.icon;
    body.innerHTML=`
      <div class="auto-preview">
        <div class="big-icon">
          ${favUrl?`<img src="${favUrl}" alt="" onerror="this.parentNode.innerHTML='🌐'" style="width:100%;height:100%;object-fit:contain">`:'<span style="font-size:28px">🌐</span>'}
        </div>
        <p>${isAuto?'<span style="color:var(--green)">✓ 当前已是自动获取模式</span>':'点击「确认」将切换为自动获取'}</p>
        <div class="domain">${domain||'（URL 为空，无法抓取）'}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">来源：google/duckduckgo</div>
      </div>`;
    pickerPendingIcon='';

  }else if(pickerTab==='upload'){
    body.innerHTML=`
      <div class="upload-mini" id="mini-drop"
        onclick="document.getElementById('mini-file').click()"
        ondragover="event.preventDefault();this.classList.add('drag')"
        ondragleave="this.classList.remove('drag')"
        ondrop="handleMiniDrop(event)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>点击或拖拽上传</p>
        <small>上传后自动选中并应用</small>
      </div>
      <input id="mini-file" type="file" accept="image/*,.svg,.ico" style="display:none" onchange="handleMiniUpload(event)">
      <div id="mini-prog" style="display:none;margin-top:8px">
        <div style="font-size:11px;color:var(--text2)" id="mini-prog-txt"></div>
        <div class="progress"><div class="progress-bar" id="mini-prog-bar" style="width:0"></div></div>
      </div>`;

  }else if(pickerTab==='pick'){
    renderPickTab();
  }
}

function renderPickTab(filter=''){
  const body=document.getElementById('ipanel-body');
  const filtered=filter
    ?iconsData.filter(ic=>ic.name.toLowerCase().includes(filter.toLowerCase()))
    :iconsData;

  const existing=body.querySelector('.icon-search-wrap');
  if(existing){
    renderIconGrid(body,filtered,filter);
    return;
  }

  body.innerHTML=`
    <div class="icon-search-wrap">
      <input type="search" placeholder="搜索图标名称…" value="${esc(filter)}"
        oninput="renderPickTab(this.value)" style="padding-left:28px">
    </div>
    <div id="icon-grid-container"></div>`;
  renderIconGrid(body,filtered,filter);
}

// ── FIX 2: 弹窗 pick tab 图标 src 加 sha 破缓存 ──
function renderIconGrid(body,filtered,filter){
  const container=body.querySelector('#icon-grid-container')||body.querySelector('.icon-grid-scroll')?.parentNode;
  const html=!iconsData.length
    ?'<div style="text-align:center;padding:16px;font-size:12px;color:var(--text3)">暂无图标，请先上传</div>'
    :filtered.length===0
      ?'<div style="text-align:center;padding:16px;font-size:12px;color:var(--text3)">没有匹配的图标</div>'
      :`<div class="icon-grid-scroll"><div class="icon-picker-grid">
        ${filtered.map(ic=>{
          const val=ICONS_PREFIX+ic.name;
          return`<div class="icon-opt ${pickerPendingIcon===val?'sel':''}" onclick="selectPendingIcon('${val}')">
            <img src="${SITE_ICON_BASE+ic.name}?t=${ic.sha.slice(-6)}" alt="${ic.name}" onerror="this.src='${ic.url}'">
            <span>${ic.name.replace(/\.[^.]+$/,'')}</span>
          </div>`;
        }).join('')}
      </div></div>`;
  if(container) container.innerHTML=html;
}

function selectPendingIcon(val){
  pickerPendingIcon=val;
  document.querySelectorAll('.icon-opt').forEach(el=>{
    el.classList.toggle('sel',el.getAttribute('onclick').includes(`'${val}'`));
  });
}

async function handleMiniUpload(e){
  const file=e.target.files[0];e.target.value='';
  if(!file)return;
  await doSingleIconUpload(file);
}
async function handleMiniDrop(e){
  e.preventDefault();document.getElementById('mini-drop')?.classList.remove('drag');
  const file=e.dataTransfer.files[0];
  if(!file)return;
  await doSingleIconUpload(file);
}
async function doSingleIconUpload(file){
  const prog=document.getElementById('mini-prog');
  const bar=document.getElementById('mini-prog-bar');
  const txt=document.getElementById('mini-prog-txt');
  prog.style.display='block';txt.textContent='上传中…';bar.style.width='30%';
  try{
    const bytes=new Uint8Array(await file.arrayBuffer());
    let sha='';
    try{const ex=await gh(`contents/${ICONS_DIR}/${encodeURIComponent(file.name)}?ref=${BRANCH}`);sha=ex.sha;}catch{}
    await putBinary(`${ICONS_DIR}/${file.name}`,bytes,sha,`upload icon: ${file.name}`);
    bar.style.width='100%';
    await loadIcons();
    renderIconsGrid();
    pickerPendingIcon=ICONS_PREFIX+file.name;
toast('✅ 上传成功，已自动选中');
switchITab('pick');
// 新图标固定排在列表末尾（iconsData.push），自动跳转后默认在不可见区域，
// 需要手动滚动到选中项才能让用户立即看到刚才传的是哪个图标。
requestAnimationFrame(()=>{
  document.querySelector('.icon-opt.sel')?.scrollIntoView({block:'center',behavior:'smooth'});
});
  }catch(err){
    toast('上传失败：'+err.message,'err');
    prog.style.display='none';
  }
}

function confirmIcon(){
  if(!pickerTarget)return;
  const{si,ii}=pickerTarget;
  linksData[si].items[ii].icon=pickerPendingIcon;
  setDirty();
  closeIPPanel();
  const tbody=document.getElementById(`tbody-${si}`);
  if(tbody){
    const rows=tbody.querySelectorAll('tr');
    if(rows[ii]){
      const it=linksData[si].items[ii];
      rows[ii].cells[1].innerHTML=iconCellHtml(si,ii,it);
    }
  }
}

async function deleteIcon(name, sha){
  if(!confirm(`确定删除图标「${name}」？\n（已使用该图标的链接将回退到自动获取）`)) return;
  try{
    await delFile(`${ICONS_DIR}/${name}`, sha, `delete icon: ${name}`);
    // 清理 linksData 中所有引用该图标的条目，回退到自动获取
    let affected = 0;
    linksData.forEach(sec => sec.items.forEach(it => {
      if(it.icon && it.icon.replace(/^.*\/([^/]+)$/,'$1') === name){
        it.icon = ''; affected++;
      }
    }));
    if(affected){ setDirty(); renderSection(currentSec); }
    toast('✅ 已删除：' + name + (affected ? `，${affected} 条链接已回退到自动获取` : ''));
    await loadIcons();
    renderIconsGrid();
  } catch(e){
    toast('删除失败：' + e.message, 'err');
  }
}

// ── FIX 1: 图标管理页 img src 加 sha 破缓存 ──
function renderIconsGrid(){
  const g=document.getElementById('icons-grid');
  if(!g)return;
  if(!iconsData.length){g.innerHTML='<div class="empty">还没有图标，上传后可在链接里选用</div>';return;}
  g.innerHTML=iconsData.map(ic=>`
    <div class="icon-card">
      <img src="${SITE_ICON_BASE+ic.name}?t=${ic.sha.slice(-6)}" alt="${ic.name}" onerror="this.src='${ic.url}'">
      <div class="iname">${ic.name}</div>
      <button class="del-icon" onclick="deleteIcon('${ic.name}','${ic.sha}')">✕</button>
    </div>`).join('');
}
function handleIconDrop(e){
  e.preventDefault();document.getElementById('drop-zone').classList.remove('drag');
  const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')||/\.(svg|ico)$/i.test(f.name));
  if(files.length)uploadIconFiles(files);
}
async function uploadIconFiles(files){
  const prog=document.getElementById('upload-prog'),bar=document.getElementById('prog-bar'),txt=document.getElementById('prog-txt');
  prog.style.display='block';
  let done=0, fail=0;

  for(const file of files){
    txt.textContent=`上传 ${file.name}（${done+fail+1}/${files.length}）`;
    bar.style.width=((done+fail)/files.length*100)+'%';
    try{
      const bytes=new Uint8Array(await file.arrayBuffer());
      let sha='';
      try{
        const ex=await gh(`contents/${ICONS_DIR}/${file.name}?ref=${BRANCH}`);
        sha=ex.sha;
      }catch{}
      await putBinary(`${ICONS_DIR}/${file.name}`,bytes,sha,`upload icon: ${file.name}`);
      done++;
      bar.style.width=((done+fail)/files.length*100)+'%';
      await loadIcons();
      renderIconsGrid();
    }catch(e){
      fail++;
      toast('上传 '+file.name+' 失败：'+e.message,'err');
    }
  }

  prog.style.display='none';
  if(done>0) toast(`✅ 上传完成，共 ${done} 个图标${fail>0?`，${fail} 个失败`:''}` );
}

async function saveAll(){
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='保存中…';
  try{
    const out=linksData.map(sec=>{
      const obj={
        section:sec.section,
        items:sec.items.map(it=>{
          const o={title:it.title,url:it.url,desc:it.desc||''};
          if(it['data-desc'])o['data-desc']=it['data-desc'];
          if(it.icon)o.icon=it.icon;
          if(it.intranet)o.intranet=it.intranet;
          return o;
        })
      };
      return obj;
    });
    const res=await putFile('links.json',JSON.stringify(out,null,2),linksSha,'update links.json via editor');
    linksSha=res.content.sha;
    setDirty(false);toast('✅ 已保存到 GitHub，约 30 秒后生效');
  }catch(e){toast('保存失败：'+e.message,'err',6000);}
  finally{btn.disabled=false;btn.textContent='💾 保存到 GitHub';}
}

function togglePwd(id,btn){
  const inp=document.getElementById(id);
  if(!inp)return;
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  btn.textContent=show?'🙈':'👁';
}

function toggleMobSidebar(){
  const s=document.getElementById('sidebar');
  const o=document.getElementById('mob-overlay');
  const open=s.classList.contains('mob-open');
  open?closeMobSidebar():(s.classList.add('mob-open'),o.classList.add('show'));
}
function closeMobSidebar(){
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('mob-overlay').classList.remove('show');
}

window.addEventListener('beforeunload',e=>{if(isDirty){e.preventDefault();e.returnValue='';}});
loadSaved();
showPanel('links');
</script>
