<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <!-- 页面标题：快捷导航 -->
  <title>快捷导航</title>
  <!-- 页面图标，直接用 emoji 作为 SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 背景图层，由 main.js 动态设置随机图片 -->
<div id="bgLayer"></div>
<!-- 背景半透明遮罩 -->
<div id="bgOverlay"></div>

<div class="container">
  <!-- 头部区域 -->
  <div class="header-area">
    <span class="header-icon">🧭</span>
    <div>
      <h1>快捷导航</h1>
      <p class="header-subtitle">沉舟侧畔千帆过，病树前头万木春。</p>
    </div>
    <span class="header-icon">✦</span>
  </div>

  <!-- 搜索引擎与搜索框区域 -->
  <div class="search-wrapper">
    <!-- 搜索分类标签（当前仅用“网页”一个分类，隐藏即可） -->
    <div class="search-tabs" id="searchTabs"></div>

    <!-- 搜索框 -->
    <div class="search-box">
      <!-- 当前搜索引擎触发器，点击展开面板 -->
      <button class="engine-trigger" id="engineTrigger" aria-label="切换搜索引擎">
        <img id="search-engine-icon" src="" alt="搜索引擎图标">
        <span class="engine-name" id="engineName"></span>
        <span class="engine-arrow" id="engineArrow">▾</span>
      </button>
      <div class="search-divider"></div>
      <!-- 搜索输入框，输入时自动过滤站内链接，回车直接搜索 -->
      <input type="text" id="searchInput" placeholder="搜索网页 / 定位站内网站" autocomplete="off" oninput="filterLinks()" />
      <!-- 清空按钮 -->
      <button class="clear-btn" id="clearBtn" aria-label="清空" style="display:none;" onclick="clearSearch()">✕</button>
      <!-- 搜索提交按钮 -->
      <button class="search-submit-btn" onclick="doSearch()" aria-label="搜索">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>

    <!-- 搜索引擎选择面板（默认隐藏） -->
    <div class="engine-list" id="enginePanel" style="display:none;"></div>
  </div>

  <!-- 站内链接展示区域（无链接时自动隐藏，无任何占位文字） -->
  <div id="main-content" style="display:none;"></div>
</div>

<!-- 主逻辑脚本 -->
<script src="main.js"></script>
</body>
</html>
